services:
  # Base de donnees PostgreSQL
  db_postgres:
    image: postgres:16
    container_name: postgres_db_weather
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    ports:
      - "5434:5433" # Port local 5434 vers port container 5432

  dagster_app:
    build: .
    container_name: dagster_pipeline_weather
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - db_postgres # Attendre que la DB soit prete avant de lancer
